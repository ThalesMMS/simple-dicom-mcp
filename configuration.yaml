# DICOM nodes configuration
nodes:
  orthanc:
    host: "localhost"
    port: 4242
    ae_title: "ORTHANC"
    description: "Default Local Orthanc DICOM server"
    aliases: ["local", "dev-orthanc"]
 
  radiant:
    host: "localhost"
    port: 11112
    ae_title: "RADIANT"
    description: "Radiant Viewer Dicom Node"
    aliases: ["viewer"]
 
  monai-deploy:
    host: "localhost"
    port: 104
    ae_title: "MONAI-DEPLOY"
    description: "Monai Deploy Dicom Node"
    aliases: []
 
# Currently selected node
current_node: "orthanc"
 
# Local calling AE titles
calling_aets:
  default:
    ae_title: "MCPSCU"
    description: "Default calling AE"
 
# Currently selected calling AE title
calling_aet: "default"
 
# Query root selection ("study" or "patient")
query_root: "study"

# Keep remote PACS/VNA hosts disabled unless you explicitly trust the environment.
allow_remote_hosts: false
 
# Network timeouts and PDU size
network:
  acse_timeout: 10
  dimse_timeout: 30
  network_timeout: 30
  assoc_timeout: 10
  max_pdu: 16384
  retry:
    max_attempts: 2
    backoff_seconds: 1.0
    backoff_multiplier: 2.0
    backoff_max_seconds: 5.0
